<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1c1c24;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --accent-pink: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(45deg, #ff6b6b, #c0392b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .ticket-card {
            background-color: var(--card-bg); border-radius: 20px; padding: 24px;
            width: 100%; max-width: 350px; margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-size: 22px; font-weight: 700; margin: 0; }
        .price { font-size: 20px; font-weight: 800; color: #fff; }
        .desc { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }

        .btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-size: 16px; font-weight: 700; color: white; cursor: pointer; text-transform: uppercase;
        }
        .btn-base { background: var(--accent-blue); }
        .btn-vip { background: var(--accent-pink); }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Nyako-kon Tickets</h1>
        <p>Официальная покупка билетов</p>
    </div>

    <div class="ticket-card">
        <div class="card-header">
            <h2 class="card-title">База 🌸</h2>
            <div class="price">300 ₴</div>
        </div>
        <div class="desc">Обычный входной билет. Доступ ко всем зонам фестиваля, ярмарке и аллее авторов.</div>
        <button class="btn btn-base" onclick="buyTicket('Входной (300 грн)')">Залутать билет</button>
    </div>

    <div class="ticket-card">
        <div class="card-header">
            <h2 class="card-title">VIP 👑</h2>
            <div class="price">600 ₴</div>
        </div>
        <div class="desc">Ранний вход, место в первом ряду на шоу, эксклюзивный мерч и респект.</div>
        <button class="btn btn-vip" onclick="buyTicket('VIP (600 грн)')">Взять VIP</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function buyTicket(type) {
            tg.sendData(type);
            tg.close();
        }
    </script>

</body>
</html>
