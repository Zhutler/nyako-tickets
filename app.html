<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .ticket-card { border: 1px solid #333; border-radius: 15px; padding: 15px; margin: 10px; background: #252525; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .hidden { display: none; }
        input[type="file"] { margin: 20px 0; }
        .status { color: #aaa; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div id="step1">
        <h2>Выбери билет</h2>
        <div class="ticket-card">
            <h3>Входной</h3>
            <p>300 грн</p>
            <button class="btn" onclick="selectTicket('Входной (300 грн)')">Выбрать</button>
        </div>
        <div class="ticket-card">
            <h3>VIP</h3>
            <p>600 грн</p>
            <button class="btn" onclick="selectTicket('VIP (600 грн)')">Выбрать</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <h2>Оплата</h2>
        <p id="selected-info"></p>
        <div class="ticket-card">
            <p>Переведи сумму на карту:</p>
            <p><b>4441 1111 2222 3333</b></p>
            <p>(Монобанк)</p>
        </div>
        <p>Загрузи скрин чека:</p>
        <input type="file" id="fileInput" accept="image/*">
        <button class="btn" onclick="sendData()">Отправить чек</button>
    </div>

    <div id="step3" class="hidden">
        <h2>Готово!</h2>
        <p>Чек отправлен админу. Можешь закрывать окно, билет придет в личку бота.</p>
        <button class="btn" onclick="tg.close()">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let selectedTicket = '';

        function selectTicket(type) {
            selectedTicket = type;
            document.getElementById('selected-info').innerText = 'Ты выбрал: ' + type;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function sendData() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('Сначала выбери файл чека!');
                return;
            }
            
            // Мы передаем боту информацию о том, что юзер закончил в аппке
            tg.sendData(JSON.stringify({
                ticket: selectedTicket,
                status: 'submitted'
            }));
            
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }
    </script>
</body>
</html>
